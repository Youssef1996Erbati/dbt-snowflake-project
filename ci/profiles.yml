# =============================================================================
# profiles.yml pour la CI (GitHub Actions)
# Aucun secret en clair : tout est lu depuis les variables d'environnement,
# elles-mêmes alimentées par les GitHub Secrets.
# Ce fichier PEUT être committé sans risque.
# =============================================================================

Project_dbt:
  target: ci
  outputs:
    ci:
      type: snowflake
      account:   "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user:      "{{ env_var('SNOWFLAKE_USER') }}"
      password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      "{{ env_var('SNOWFLAKE_ROLE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      database:  "{{ env_var('SNOWFLAKE_DATABASE') }}"
      schema:    "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 4
